# orchestration/docker-compose.yml
# Local Airflow 2.x — LocalExecutor + PostgreSQL.
# Cloud Composer is the production equivalent; swap executor + connections to migrate.
#
# First-time setup:
#   cd orchestration
#   echo "AIRFLOW_UID=$(id -u)" >> .env        # sets file-ownership inside container
#   docker compose up airflow-init              # creates DB schema + admin user
#   docker compose up -d                        # start webserver + scheduler
#
# UI: http://localhost:8081  (admin / admin)
# Trigger pipeline: airflow dags trigger diabetes_pipeline
#
# The repo root is bind-mounted read-only at /opt/uci_diabetes so DAG operators
# can call project scripts directly (ml/, deploy/, monitoring/).

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.0-python3.11
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    # Forward GCP + project vars from the host .env file
    GCP_PROJECT_ID:   ${GCP_PROJECT_ID:-}
    GCP_REGION:       ${GCP_REGION:-us-central1}
    GCS_BUCKET:       ${GCS_BUCKET:-}
    INFERENCE_IMAGE:  ${INFERENCE_IMAGE:-}
    SNOWFLAKE_USER:   ${SNOWFLAKE_USER:-}
    SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD:-}
    XGB_N_TRIALS:     ${XGB_N_TRIALS:-3}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    # Repo root — scripts executed via PythonOperator subprocess
    - ../:/opt/uci_diabetes:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8081:8080"   # 8080 reserved for the inference container
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com
    environment:
      <<: *airflow-common-env

volumes:
  postgres_data:
